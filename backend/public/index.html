<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markify | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Login Overlay */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-card h2 { margin-bottom: 24px; font-weight: 700; }
        .login-card p { color: var(--text-dim); margin-bottom: 32px; font-size: 14px; }
        .login-card input { width: 100%; margin-bottom: 16px; text-align: left; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { font-size: 24px; color: var(--text); font-weight: 700; border-left: 4px solid var(--primary); padding-left: 14px; }

        /* Dashboard Stats */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-label { color: var(--text-dim); font-size: 14px; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }

        /* Form Card */
        .card { background: var(--card); border-radius: 16px; padding: 32px; margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.05); }
        .card h2 { font-size: 18px; margin-bottom: 24px; color: var(--text-dim); }

        .add-form { display: flex; gap: 12px; }
        input { background: #0f172a; border: 1px solid #334155; color: var(--text); padding: 12px 16px; border-radius: 10px; outline: none; flex: 1; transition: border 0.2s;}
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }

        /* License Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 16px; color: var(--text-dim); font-size: 14px; border-bottom: 1px solid #334155; }
        td { padding: 16px; font-size: 14px; border-bottom: 1px solid #334155; color: var(--text); }
        tr:hover { background: rgba(255,255,255,0.02); }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-active { background: rgba(16,185,129,0.1); color: var(--success); }
        .badge-inactive { background: rgba(239,68,68,0.1); color: var(--danger); }
        .badge-none { background: rgba(148,163,184,0.1); color: var(--text-dim); }

        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
        .btn-danger { background: var(--danger); }
        .btn-secondary { background: #334155; }

        .key-text { font-family: monospace; background: #020617; padding: 4px 8px; border-radius: 4px; color: var(--primary); font-weight:600;}
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- 🔐 Login View -->
<div id="loginOverlay">
    <div class="login-card">
        <h2>Admin Access</h2>
        <p>Please enter your administrator credentials to continue.</p>
        <input type="text" id="adminUserInput" placeholder="Username" onkeypress="if(event.key==='Enter') login()">
        <input type="password" id="adminPassInput" placeholder="Password" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()" style="width: 100%">Authenticate</button>
        <div id="loginError" style="color: var(--danger); margin-top: 16px; font-size: 13px;" class="hidden">Invalid Credentials</div>
    </div>
</div>

<!-- 📊 Dashboard View -->
<div class="container hidden" id="app">
    <header>
        <div>
            <h1>Markify License Dashboard</h1>
            <p style="color: var(--text-dim); margin-top: 4px;">Manage your keys and verify usage.</p>
        </div>
        <button onclick="logout()" class="btn-secondary">Logout</button>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Total Licenses</div>
            <div id="statTotal" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active Users</div>
            <div id="statActive" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">System Region</div>
            <div class="stat-value">Global</div>
        </div>
    </div>

    <div class="card">
        <h2>Generate New Key</h2>
        <div class="add-form">
            <input type="text" id="newKey" placeholder="License Key (e.g. KEY-555-XYZ)">
            <input type="date" id="newExpiry" value="2026-12-31">
            <input type="text" id="newEmail" placeholder="Assign Email (Optional)">
            <button onclick="addLicense()">Create License</button>
        </div>
    </div>

    <div class="card">
        <h2>Existing Licenses</h2>
        <table>
            <thead>
                <tr>
                    <th>Key</th>
                    <th>Email</th>
                    <th>Expiry</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="licenseTable">
                <!-- Data goes here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const API = ''; // Same origin
    let adminUsername = localStorage.getItem('admin_username');
    let adminPassword = localStorage.getItem('admin_password');

    async function login() {
        const user = document.getElementById('adminUserInput').value;
        const pass = document.getElementById('adminPassInput').value;
        
        const res = await fetch(`${API}/admin/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: user, password: pass })
        });
        
        const data = await res.json();
        if(data.status === 'success') {
            adminUsername = user;
            adminPassword = pass;
            localStorage.setItem('admin_username', user);
            localStorage.setItem('admin_password', pass);
            showDashboard();
        } else {
            document.getElementById('loginError').classList.remove('hidden');
        }
    }

    function logout() {
        localStorage.removeItem('admin_username');
        localStorage.removeItem('admin_password');
        location.reload();
    }

    function showDashboard() {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        fetchLicenses();
    }

    async function fetchLicenses() {
        try {
            const res = await fetch(`${API}/admin/licenses`, {
                headers: { 
                    'x-admin-username': adminUsername,
                    'x-admin-password': adminPassword 
                }
            });
            if(res.status === 401) return logout();
            const data = await res.json();
            renderTable(data);
        } catch(e) {
            console.error(e);
        }
    }

    function renderTable(licenses) {
        const table = document.getElementById('licenseTable');
        table.innerHTML = '';

        // Stats
        document.getElementById('statTotal').innerText = licenses.length;
        document.getElementById('statActive').innerText = licenses.filter(l => l.email != null).length;

        licenses.forEach(l => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="key-text">${l.license_key}</span></td>
                <td>${l.email || '<span class="badge badge-none">Unassigned</span>'}</td>
                <td><input type="date" value="${l.expiry_date}" onchange="updateLicense(${l.id}, this.value, ${l.is_active})"></td>
                <td>
                    <span class="badge ${l.is_active ? 'badge-active' : 'badge-inactive'}">
                        ${l.is_active ? 'Active' : 'Deactivated'}
                    </span>
                </td>
                <td>
                    <button class="btn-sm btn-secondary" onclick="updateLicense(${l.id}, '${l.expiry_date}', ${l.is_active ? 0 : 1})">
                        ${l.is_active ? 'Deactivate' : 'Activate'}
                    </button>
                    <button class="btn-sm btn-danger" onclick="deleteLicense(${l.id})">Delete</button>
                </td>
            `;
            table.appendChild(tr);
        });
    }

    async function addLicense() {
        const key = document.getElementById('newKey').value;
        const expiry = document.getElementById('newExpiry').value;
        const email = document.getElementById('newEmail').value;

        if(!key || !expiry) return alert('Key and Expiry are required');

        const res = await fetch(`${API}/admin/add-license`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-admin-username': adminUsername,
                'x-admin-password': adminPassword
            },
            body: JSON.stringify({ license_key: key, expiry_date: expiry, email: email || null })
        });
        
        if(res.status === 401) return logout();
        
        fetchLicenses();
        document.getElementById('newKey').value = '';
    }

    async function updateLicense(id, expiry, active) {
        const res = await fetch(`${API}/admin/license/${id}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'x-admin-username': adminUsername,
                'x-admin-password': adminPassword
            },
            body: JSON.stringify({ expiry_date: expiry, is_active: active })
        });
        
        if(res.status === 401) return logout();
        fetchLicenses();
    }

    async function deleteLicense(id) {
        if(!confirm('Are you sure you want to delete this license?')) return;
        const res = await fetch(`${API}/admin/license/${id}`, { 
            method: 'DELETE',
            headers: { 
                'x-admin-username': adminUsername,
                'x-admin-password': adminPassword 
            }
        });
        
        if(res.status === 401) return logout();
        fetchLicenses();
    }

    // Auto-login if credentials exist
    if(adminUsername && adminPassword) {
        showDashboard();
    }
</script>

</body>
</html>
